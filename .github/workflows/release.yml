name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm (sigma-proofs)
        run: npm publish --provenance --access public
        working-directory: packages/sigma-proofs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish to npm (act-ts)
        run: npm publish --provenance --access public
        working-directory: packages/act
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            packages/*/dist/**

  publish-github-packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@cloudflare'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Configure packages for GitHub registry
        run: |
          # Update package names for GitHub Packages (scoped to org)
          cd packages/sigma-proofs
          npm pkg set name="@cloudflare/sigma-proofs"
          cd ../act
          npm pkg set name="@cloudflare/act-ts"

      - name: Publish sigma-proofs to GitHub Packages
        run: npm publish
        working-directory: packages/sigma-proofs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish act-ts to GitHub Packages
        run: npm publish
        working-directory: packages/act
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
